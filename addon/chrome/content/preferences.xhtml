<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox style="padding: 14px; font-family: inherit;" onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });">
  <label>
    <html:h2 style="margin-top: 0; margin-bottom: 14px; font-size: 16px; font-weight: 600; color: var(--color-text-primary); font-family: inherit;" data-l10n-id="pref-title"></html:h2>
  </label>

  <html:div style="display: grid; grid-template-columns: 100px 1fr; gap: 7px; margin-bottom: 12px; align-items: center;">
    <html:label for="__addonRef__-input" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;" data-l10n-id="pref-input"></html:label>
    <html:input type="text" id="__addonRef__-input" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.input"></html:input>
    
    <html:label for="__addonRef__-base" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;" data-l10n-id="pref-base"></html:label>
    <html:input type="text" id="__addonRef__-base" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.base"></html:input>
    
    <html:label for="__addonRef__-model" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;" data-l10n-id="pref-model"></html:label>
    <html:input type="text" id="__addonRef__-model" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.model"></html:input>

    <html:label for="__addonRef__-pse_id" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;">PSE ID</html:label>
    <html:input type="text" id="__addonRef__-pse_id" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.pse_id"></html:input>
    <html:label for="__addonRef__-pse_key" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;">PSE Key</html:label>
    <html:input type="text" id="__addonRef__-pse_key" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.pse_key"></html:input>

    <html:label for="__addonRef__-pse_count" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;">Search results count</html:label>
    <html:input type="text" id="__addonRef__-pse_count" value="5" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.pse_count"></html:input>

    <html:label for="__addonRef__-jina_key" style="font-size: 13px; color: var(--color-text-primary); font-family: inherit;">Jina API Key</html:label>
    <html:input type="text" id="__addonRef__-jina_key" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 6px 6px 0 0; font-size: 13px; height: 22px; width: 100%; background-color: rgba(120,120,120,0.06); outline: none; font-family: inherit;" preference="__prefsPrefix__.jina_key"></html:input>

    <html:label for="__addonRef__-lang" style="font-size: 13px; color: var(--color-text-primary); height: 24px; display: flex; align-items: center; font-family: inherit;" data-l10n-id="pref-lang"></html:label>
    <html:select id="__addonRef__-lang" style="padding: 1px 0 1px 7px; border: none; border-bottom: 1.5px solid #bbb; border-radius: 0; font-size: 13px; height: 22px; width: 80px; min-width: 0; background-color: rgba(120,120,120,0.06); color: var(--color-text-primary); line-height: 1.2; margin-left: 8px; outline: none; font-family: inherit;" preference="__prefsPrefix__.lang">
      <html:option value="zh-CN" data-l10n-id="pref-lang-zh"></html:option>
      <html:option value="en-US" data-l10n-id="pref-lang-en"></html:option>
    </html:select>
  </html:div>
  
</groupbox>
